<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>For You - WiFi QR</title>
    <link rel="icon" type="image/svg+xml" href="/favicons/stage.svg" />
    <style>
      :root {
        --qr-size: min(68vmin, 700px);
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      body {
        font-family: "TikTok Sans", "Avenir Next", "Segoe UI", system-ui, sans-serif;
      }

      #stageRoot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      #wifiStack {
        display: grid;
        justify-items: center;
        gap: clamp(14px, 3vmin, 34px);
        max-width: calc(100vw - 24px);
        max-height: calc(100vh - 24px);
      }

      #qrOutput {
        width: var(--qr-size);
        max-width: calc(100vw - 24px);
        display: grid;
        place-items: center;
      }

      #qrOutput svg {
        display: block;
        width: 100%;
        height: auto;
      }

      #wifiText {
        min-width: var(--qr-size);
        max-width: calc(100vw - 24px);
        color: #fff;
        text-align: left;
        text-shadow:
          0 2px 0 rgba(0, 0, 0, 0.9),
          0 -2px 0 rgba(0, 0, 0, 0.9),
          2px 0 0 rgba(0, 0, 0, 0.9),
          -2px 0 0 rgba(0, 0, 0, 0.9),
          0 6px 22px rgba(0, 0, 0, 0.55);
        line-height: 1.08;
      }

      #wifiSsid,
      #wifiPassword {
        font-size: clamp(20px, 5.2vmin, 50px);
        font-weight: 800;
      }

      #wifiPassword {
        margin-top: clamp(6px, 1.6vmin, 18px);
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body data-qr-output="wifi">
    <main id="stageRoot">
      <div id="wifiStack" class="hidden">
        <div id="qrOutput" aria-label="WiFi QR"></div>
        <div id="wifiText">
          <div id="wifiSsid"></div>
          <div id="wifiPassword"></div>
        </div>
      </div>
    </main>

    <script src="/vendor/qrcode-generator.min.js"></script>
    <script src="/stage-qr-output.js"></script>
  </body>
</html>
