<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>For You - API Playground Stage</title>
    <style>
      :root {
        --stage-w: 1080px;
        --stage-h: 1920px;
        --fg: #fff;
        --bg: #000;
        --muted: rgba(255, 255, 255, 0.42);
        --soft: rgba(255, 255, 255, 0.64);
        --stage-font-family: "JetBrains Mono", "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        --stage-message-size: 30px;
        --stage-prompt-size: 34px;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--fg);
        font-family: var(--stage-font-family);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #stageWrap {
        position: fixed;
        inset: 0;
        overflow: hidden;
        background: var(--bg);
      }

      #stage {
        position: absolute;
        left: 0;
        top: 0;
        width: var(--stage-w);
        height: var(--stage-h);
        overflow: hidden;
        background: var(--bg);
        transform-origin: 0 0;
      }

      .terminal {
        position: absolute;
        inset: 0;
        box-sizing: border-box;
        padding: 96px 88px 80px;
        display: flex;
        flex-direction: column;
      }

      .hint {
        position: absolute;
        left: 88px;
        right: 88px;
        top: 56px;
        display: flex;
        justify-content: space-between;
        color: var(--muted);
        font-size: 18px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        pointer-events: none;
      }

      .log {
        flex: 1;
        min-height: 0;
        overflow-x: hidden;
        overflow-y: auto;
        display: block;
        overscroll-behavior: contain;
        scrollbar-width: none;
        -webkit-mask-image: linear-gradient(to bottom, transparent 0%, #000 18%, #000 100%);
        mask-image: linear-gradient(to bottom, transparent 0%, #000 18%, #000 100%);
      }

      .log::-webkit-scrollbar {
        display: none;
      }

      #logInner {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        gap: 56px;
      }

      .exchange {
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      .msg {
        max-width: 780px;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: var(--stage-message-size);
        line-height: 1.5;
        letter-spacing: 0.005em;
      }

      .msg.user {
        align-self: flex-end;
        text-align: right;
        opacity: 0.62;
      }

      .msg.assistant {
        align-self: flex-start;
        text-align: left;
      }

      .msg.error {
        color: #fff;
        opacity: 0.72;
      }

      .caret {
        display: inline-block;
        width: 0.55em;
        height: 1em;
        margin-left: 0.1em;
        vertical-align: -0.12em;
        background: var(--fg);
        animation: blink 0.9s steps(1, end) infinite;
      }

      .promptRow {
        display: flex;
        justify-content: flex-end;
        align-items: flex-start;
        width: 100%;
        min-height: 56px;
        margin-top: 56px;
      }

      .promptInner {
        display: inline-flex;
        align-items: baseline;
        gap: 14px;
        max-width: 100%;
        text-align: right;
      }

      .sigil {
        color: var(--soft);
        opacity: 0.7;
        font-size: var(--stage-prompt-size);
        line-height: 1.35;
        user-select: none;
      }

      #typing {
        max-width: 780px;
        color: var(--fg);
        font-size: var(--stage-prompt-size);
        line-height: 1.35;
        letter-spacing: 0.01em;
        white-space: pre-wrap;
        word-break: break-word;
        text-align: right;
      }

      .cursor {
        display: inline-block;
        width: 0.55em;
        height: 0.12em;
        margin-left: 0.08em;
        vertical-align: -0.05em;
        background: var(--fg);
        animation: blink 1.05s steps(1, end) infinite;
      }

      .streaming .cursor {
        opacity: 0.92;
      }

      #stage[data-cursor="bar"] .cursor {
        width: 0.12em;
        height: 1.05em;
        vertical-align: -0.15em;
      }

      #stage[data-cursor="block"] .cursor {
        width: 0.58em;
        height: 0.95em;
        vertical-align: -0.15em;
      }

      #hiddenInput {
        position: absolute;
        left: -1000px;
        top: -1000px;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      #status {
        position: absolute;
        left: 88px;
        right: 88px;
        bottom: 42px;
        display: flex;
        align-items: center;
        gap: 16px;
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        white-space: nowrap;
        overflow: hidden;
      }

      #usageStatus {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        opacity: 0.82;
      }

      @keyframes blink {
        0%,
        49% { opacity: 1; }
        50%,
        100% { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div id="stageWrap">
      <div id="stage">
        <main class="terminal" id="terminal">
          <div class="hint">
            <span>ENTER SEND</span>
            <span>ESC CLEAR</span>
          </div>
          <section class="log" id="log" aria-live="polite">
            <div id="logInner"></div>
          </section>
          <section class="promptRow">
            <div class="promptInner">
              <span class="sigil">&gt;</span>
              <span id="typing"><span class="cursor"></span></span>
            </div>
          </section>
        </main>
        <div id="status" aria-live="polite">
          <span id="connectionStatus">connecting</span>
          <span id="usageStatus">0 tokens · $0.0000</span>
        </div>
        <textarea id="hiddenInput" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"></textarea>
      </div>
    </div>

    <script>
      (() => {
        const STAGE_W = 1080;
        const STAGE_H = 1920;
        const RECONNECT_MIN_MS = 500;
        const RECONNECT_MAX_MS = 6000;
        const SOURCE_KEY = "api_playground_operator_stage_output_source_v1";
        const STYLE_DEFAULT = Object.freeze({ font: "jetbrains", cursor: "underscore", fontSize: 30 });
        const FONT_STACKS = {
          jetbrains: '"JetBrains Mono", "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace',
          ibm: '"IBM Plex Mono", "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace',
          system: 'ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace',
          courier: '"Courier New", Courier, monospace',
        };
        const CURSOR_CHOICES = new Set(["underscore", "bar", "block"]);
        const stageEl = document.getElementById("stage");
        const terminalEl = document.getElementById("terminal");
        const typingEl = document.getElementById("typing");
        const inputEl = document.getElementById("hiddenInput");
        const logEl = document.getElementById("log");
        const logInnerEl = document.getElementById("logInner");
        const connectionStatusEl = document.getElementById("connectionStatus");
        const usageStatusEl = document.getElementById("usageStatus");

        let ws = null;
        let reconnectTimer = null;
        let reconnectDelayMs = RECONNECT_MIN_MS;
        let sourceId = loadSourceId();
        let draft = "";
        let revision = 0;
        let streaming = false;
        let messages = [];
        let bubbleById = new Map();
        let connectionStatus = "connecting";
        let stageProvider = "";
        let stageModel = "";
        let stageTokens = 0;
        let stageCost = 0;
        let stageStyle = { ...STYLE_DEFAULT };

        function loadSourceId() {
          try {
            const existing = String(localStorage.getItem(SOURCE_KEY) || "").trim();
            if (existing) return existing;
            const generated = `stage_${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`;
            localStorage.setItem(SOURCE_KEY, generated);
            return generated;
          } catch {
            return `stage_${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`;
          }
        }

        function fitStage() {
          const scale = Math.min(window.innerWidth / STAGE_W, window.innerHeight / STAGE_H);
          const tx = (window.innerWidth - STAGE_W * scale) / 2;
          const ty = (window.innerHeight - STAGE_H * scale) / 2;
          stageEl.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
        }

        function esc(value) {
          return String(value || "").replace(/[&<>"']/g, (ch) => ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            "\"": "&quot;",
            "'": "&#39;",
          }[ch]));
        }

        function renderTyping() {
          typingEl.innerHTML = "";
          if (draft && !streaming) {
            typingEl.appendChild(document.createTextNode(draft));
          }
          const cursor = document.createElement("span");
          cursor.className = "cursor";
          typingEl.appendChild(cursor);
          terminalEl.classList.toggle("streaming", streaming);
        }

        function scrollLogToBottom() {
          requestAnimationFrame(() => {
            logEl.scrollTop = logEl.scrollHeight;
          });
        }

        function renderAssistantContent(el, text) {
          const value = String(text || "");
          if (!value) {
            el.innerHTML = '<span class="caret"></span>';
            return;
          }
          el.innerHTML = esc(value) + (el.classList.contains("streaming") ? '<span class="caret"></span>' : "");
        }

        function renderMessages(forceBottom = false) {
          logInnerEl.innerHTML = "";
          bubbleById = new Map();
          const pairs = [];
          let current = null;
          for (const message of messages) {
            if (message.role === "user" || !current) {
              current = { user: null, assistant: null };
              pairs.push(current);
            }
            if (message.role === "user") current.user = message;
            else current.assistant = message;
          }
          for (const pair of pairs.slice(-12)) {
            const exchange = document.createElement("div");
            exchange.className = "exchange";
            if (pair.user) {
              const user = document.createElement("div");
              user.className = "msg user";
              user.textContent = pair.user.content || "";
              exchange.appendChild(user);
              if (pair.user.id) bubbleById.set(String(pair.user.id), user);
            }
            if (pair.assistant) {
              const assistant = document.createElement("div");
              assistant.className = "msg assistant" + (pair.assistant.streaming ? " streaming" : "") + (pair.assistant.error ? " error" : "");
              renderAssistantContent(assistant, pair.assistant.content || "");
              exchange.appendChild(assistant);
              if (pair.assistant.id) bubbleById.set(String(pair.assistant.id), assistant);
            }
            logInnerEl.appendChild(exchange);
          }
          if (forceBottom) scrollLogToBottom();
        }

        function normalizeStyle(style = {}) {
          const source = style && typeof style === "object" ? style : {};
          const font = String(source.font || STYLE_DEFAULT.font).trim().toLowerCase();
          const cursor = String(source.cursor || STYLE_DEFAULT.cursor).trim().toLowerCase();
          const fontSize = Math.max(24, Math.min(42, Number(source.fontSize || STYLE_DEFAULT.fontSize) || STYLE_DEFAULT.fontSize));
          return {
            font: Object.prototype.hasOwnProperty.call(FONT_STACKS, font) ? font : STYLE_DEFAULT.font,
            cursor: CURSOR_CHOICES.has(cursor) ? cursor : STYLE_DEFAULT.cursor,
            fontSize,
          };
        }

        function applyStageStyle(style = {}) {
          stageStyle = normalizeStyle(style);
          document.documentElement.style.setProperty("--stage-font-family", FONT_STACKS[stageStyle.font]);
          document.documentElement.style.setProperty("--stage-message-size", `${stageStyle.fontSize}px`);
          document.documentElement.style.setProperty("--stage-prompt-size", `${stageStyle.fontSize + 4}px`);
          stageEl.dataset.cursor = stageStyle.cursor;
        }

        function numberValue(value) {
          const number = Number(value);
          return Number.isFinite(number) && number > 0 ? number : 0;
        }

        function latestUsageMeta() {
          for (let index = messages.length - 1; index >= 0; index -= 1) {
            const meta = messages[index] && messages[index].meta;
            if (meta && typeof meta === "object") return meta;
          }
          return null;
        }

        function formatTokens(value) {
          return Math.round(numberValue(value)).toLocaleString("nl-NL");
        }

        function formatCost(value) {
          const cost = numberValue(value);
          if (cost >= 1) return `$${cost.toFixed(2)}`;
          if (cost >= 0.01) return `$${cost.toFixed(3)}`;
          return `$${cost.toFixed(4)}`;
        }

        function updateUsageFromState(stage) {
          const data = stage && typeof stage === "object" ? stage : {};
          const active = data.active && typeof data.active === "object" ? data.active : {};
          stageProvider = String(active.provider || data.provider || stageProvider || "").trim();
          stageModel = String(active.model || data.model || stageModel || "").trim();

          const meta = latestUsageMeta();
          if (!meta) {
            stageTokens = 0;
            stageCost = 0;
            return;
          }

          const provider = String(stageProvider || meta.provider || "").trim().toLowerCase();
          const providerUsage = meta.provider_usage && typeof meta.provider_usage === "object" ? meta.provider_usage : {};
          const providerBucket = provider && providerUsage[provider] && typeof providerUsage[provider] === "object"
            ? providerUsage[provider]
            : null;

          if (providerBucket) {
            stageTokens = numberValue(providerBucket.tokens_totaal);
            stageCost = numberValue(providerBucket.kosten_totaal);
            return;
          }

          stageTokens = numberValue(meta.provider_tokens_totaal)
            || numberValue(meta.sessie_tokens_totaal)
            || numberValue(meta.tokens_input) + numberValue(meta.tokens_output);
          stageCost = numberValue(meta.provider_kosten_totaal)
            || numberValue(meta.sessie_kosten_totaal)
            || numberValue(meta.kosten_dollar);
        }

        function renderStatus() {
          const modelLabel = [stageProvider, stageModel].filter(Boolean).join("/");
          connectionStatusEl.textContent = connectionStatus;
          usageStatusEl.textContent = `${modelLabel ? `${modelLabel} · ` : ""}${formatTokens(stageTokens)} tokens · ${formatCost(stageCost)}`;
        }

        function setStatus(text) {
          connectionStatus = String(text || "");
          renderStatus();
        }

        function setDraft(nextDraft, nextRevision, remoteSourceId, forceBottom = false) {
          draft = String(nextDraft || "");
          if (Number.isFinite(Number(nextRevision))) revision = Number(nextRevision);
          if (remoteSourceId !== sourceId) inputEl.value = draft;
          renderTyping();
          if (forceBottom) scrollLogToBottom();
        }

        function applyState(stage, forceBottom = false) {
          const data = stage && typeof stage === "object" ? stage : {};
          applyStageStyle(data.style || stageStyle);
          streaming = !!data.streaming;
          setDraft(data.draft || "", data.revision, "", forceBottom || streaming);
          messages = Array.isArray(data.messages) ? data.messages.slice() : [];
          updateUsageFromState(data);
          renderMessages(forceBottom || streaming);
          setStatus(streaming ? "streaming" : ws && ws.readyState === WebSocket.OPEN ? "connected" : "offline");
        }

        function findMessage(id) {
          const safeId = String(id || "");
          return messages.find((message) => String(message.id || "") === safeId);
        }

        function applyDelta(data) {
          const id = String(data && data.assistantId || "");
          if (!id) return;
          let message = findMessage(id);
          if (!message) {
            message = { id, role: "assistant", content: "", streaming: true };
            messages.push(message);
          }
          message.content = typeof data.fullText === "string"
            ? data.fullText
            : String(message.content || "") + String(data.text || "");
          let bubble = bubbleById.get(id);
          if (!bubble) {
            renderMessages();
            bubble = bubbleById.get(id);
          }
          if (bubble) {
            bubble.classList.add("streaming");
            renderAssistantContent(bubble, message.content);
          }
          scrollLogToBottom();
        }

        function send(message) {
          if (!ws || ws.readyState !== WebSocket.OPEN) return false;
          try {
            ws.send(JSON.stringify(message));
            return true;
          } catch {
            return false;
          }
        }

        function sendDraft() {
          if (streaming) return;
          revision += 1;
          scrollLogToBottom();
          send({
            type: "operator_stage_draft",
            sourceId,
            text: draft,
            revision,
          });
        }

        function submit() {
          if (streaming || !draft.trim()) return;
          sendDraft();
          streaming = true;
          renderTyping();
          scrollLogToBottom();
          send({
            type: "operator_stage_submit",
            sourceId,
          });
        }

        function clearDraft() {
          if (streaming) return;
          draft = "";
          inputEl.value = "";
          revision += 1;
          renderTyping();
          scrollLogToBottom();
          send({
            type: "operator_stage_clear_draft",
            sourceId,
          });
        }

        function onSocketMessage(raw) {
          let msg = {};
          try { msg = JSON.parse(String(raw || "{}")); } catch { return; }
          if (msg.type === "operator_stage_hello" || msg.type === "operator_stage_state") {
            applyState(msg.stage || {}, true);
            return;
          }
          if (msg.type === "operator_stage_draft") {
            setDraft(msg.draft || "", msg.revision, msg.sourceId || "", true);
            return;
          }
          if (msg.type === "operator_stage_style") {
            applyStageStyle(msg.style || (msg.stage && msg.stage.style) || {});
            return;
          }
          if (msg.type === "operator_stage_user" || msg.type === "operator_stage_start" || msg.type === "operator_stage_done" || msg.type === "operator_stage_error") {
            applyState(msg.stage || {}, true);
            return;
          }
          if (msg.type === "operator_stage_delta") {
            applyDelta(msg);
          }
        }

        function scheduleReconnect() {
          if (reconnectTimer) return;
          reconnectTimer = setTimeout(() => {
            reconnectTimer = null;
            connect();
          }, reconnectDelayMs);
          reconnectDelayMs = Math.min(RECONNECT_MAX_MS, Math.floor(reconnectDelayMs * 1.6));
        }

        function connect() {
          if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
          const protocol = window.location.protocol === "https:" ? "wss" : "ws";
          setStatus("connecting");
          try {
            ws = new WebSocket(`${protocol}://${window.location.host}/?operatorStage=1`);
          } catch {
            setStatus("offline");
            scheduleReconnect();
            return;
          }
          ws.addEventListener("open", () => {
            reconnectDelayMs = RECONNECT_MIN_MS;
            setStatus("connected");
            send({ type: "operator_stage_refresh", sourceId });
          });
          ws.addEventListener("message", (event) => onSocketMessage(event && event.data));
          ws.addEventListener("close", () => {
            ws = null;
            setStatus("reconnecting");
            scheduleReconnect();
          });
          ws.addEventListener("error", () => setStatus("reconnecting"));
        }

        function refocus() {
          try { inputEl.focus({ preventScroll: true }); } catch {}
        }

        inputEl.addEventListener("input", () => {
          if (streaming) {
            inputEl.value = draft;
            return;
          }
          draft = inputEl.value;
          renderTyping();
          sendDraft();
        });

        inputEl.addEventListener("keydown", (event) => {
          if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            submit();
            return;
          }
          if (event.key === "Escape") {
            event.preventDefault();
            clearDraft();
            return;
          }
          if (streaming) {
            event.preventDefault();
          }
        });

        document.addEventListener("click", refocus);
        document.addEventListener("touchstart", refocus, { passive: true });
        window.addEventListener("resize", fitStage);
        setInterval(refocus, 500);
        fitStage();
        applyStageStyle(STYLE_DEFAULT);
        renderTyping();
        renderMessages();
        refocus();
        connect();
      })();
    </script>
  </body>
</html>
