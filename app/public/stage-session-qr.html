<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>For You - Sessie QR</title>
    <link rel="icon" type="image/svg+xml" href="/favicons/stage.svg" />
    <style>
      :root {
        --qr-size: min(88vmin, 820px);
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      body {
        font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
      }

      #stageRoot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      #qrOutput {
        width: var(--qr-size);
        max-width: calc(100vw - 24px);
        max-height: calc(100vh - 24px);
        display: grid;
        place-items: center;
      }

      #qrOutput svg {
        display: block;
        width: 100%;
        height: auto;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body data-qr-output="session">
    <main id="stageRoot">
      <div id="qrOutput" class="hidden" aria-label="Sessie QR"></div>
    </main>

    <script src="/vendor/qrcode-generator.min.js"></script>
    <script src="/stage-qr-output.js"></script>
  </body>
</html>
