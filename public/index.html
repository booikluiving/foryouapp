<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Live reacties</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --ink: #16202b;
        --muted: #5f6b7a;
        --line: #d9e2ec;
        --line-strong: #c3cfdb;
        --surface: #ffffff;
        --surface-soft: #f8fbff;
        --surface-elevated: #ffffff;
        --button-bg: #ffffff;
        --accent: #2563eb;
        --accent-soft: #dbeafe;
        --reaction-impact: rgba(37, 99, 235, 0.42);
        --reaction-impact-clear: rgba(37, 99, 235, 0);
        --poll-line: #cbd5e1;
        --shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        --toast-bg: rgba(28, 28, 28, 0.86);
        --toast-subtle-bg: rgba(28, 28, 28, 0.74);
        --toast-ink: #ffffff;
      }
      body.theme-dark {
        --bg: #0f1722;
        --ink: #e6edf5;
        --muted: #9fb0c3;
        --line: #26384c;
        --line-strong: #314862;
        --surface: #152233;
        --surface-soft: #1a2b3f;
        --surface-elevated: #152233;
        --button-bg: #1a2b3f;
        --accent: #6cb8ff;
        --accent-soft: #223c5a;
        --reaction-impact: rgba(108, 184, 255, 0.46);
        --reaction-impact-clear: rgba(108, 184, 255, 0);
        --poll-line: #3b5470;
        --shadow: 0 10px 24px rgba(0, 0, 0, 0.34);
        --toast-bg: rgba(11, 17, 26, 0.9);
        --toast-subtle-bg: rgba(11, 17, 26, 0.82);
        --toast-ink: #e6edf5;
      }
      html {
        height: 100%;
      }
      body {
        margin: 0;
        min-height: 100%;
        font-family: system-ui, -apple-system, Arial, sans-serif;
        padding: 16px;
        background: var(--bg);
        color: var(--ink);
      }
      input, textarea, button {
        font-size: 18px;
        padding: 12px;
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      input, textarea {
        background: var(--surface);
        color: var(--ink);
      }
      input::placeholder, textarea::placeholder {
        color: var(--muted);
        opacity: 1;
      }
      button {
        margin-top: 10px;
        background: var(--button-bg);
        color: var(--ink);
      }
      textarea {
        resize: vertical;
        min-height: 52px;
        max-height: 220px;
      }
      .muted {
        color: var(--muted);
      }
      #status { display: none; }
      #nameRow { margin: 10px 0; opacity: 0.9; display: flex; gap: 10px; align-items: center; }
      #nameRow span { flex: 1; }
      .topBar { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
      .titleWrap {
        display: inline-flex;
        align-items: baseline;
        gap: 8px;
        min-width: 0;
      }
      .buildBadge {
        display: inline-block;
        padding: 2px 7px;
        border: 1px solid var(--line);
        border-radius: 999px;
        font-size: 11px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: var(--muted);
        background: var(--surface-soft);
        white-space: nowrap;
      }
      #settingsMenu { position: relative; }
      #settingsMenu summary {
        list-style: none;
        cursor: pointer;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        padding: 4px 10px;
        font-size: 18px;
        user-select: none;
        background: var(--button-bg);
      }
      #settingsMenu summary::-webkit-details-marker { display: none; }
      .settingsContent {
        position: absolute;
        right: 0;
        margin-top: 8px;
        width: min(92vw, 420px);
        background: var(--surface-elevated);
        border: 1px solid var(--line);
        border-radius: 10px;
        box-shadow: var(--shadow);
        padding: 8px;
        z-index: 10;
      }
      .settingsContent button { margin-top: 0; }
      #devPanel {
        margin-top: 8px;
        display: grid;
        gap: 8px;
      }
      #devPanel[hidden] { display: none; }
      .devLabel {
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        opacity: 0.9;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .devLog {
        min-height: 80px;
        max-height: 180px;
        overflow: auto;
        margin: 0;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-soft);
        color: var(--ink);
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
        line-height: 1.35;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      #chatFeed {
        min-height: 140px;
        max-height: 46vh;
        overflow: auto;
        display: flex;
        flex-direction: column-reverse;
        gap: 2px;
        margin-top: 14px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface-soft);
        color: var(--ink);
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.35;
        font-size: 14px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      #chatFeed .chatLine {
        white-space: pre-wrap;
        word-break: break-word;
      }
      #chatFeed .chatLine + .chatLine {
        margin-top: 0;
      }
      #chatFeed .chatTime {
        opacity: 0.72;
      }
      #chatFeed .chatName {
        font-weight: 700;
      }
      #reactionBar {
        display: flex;
        gap: 8px;
        margin-top: 8px;
        margin-bottom: 8px;
        padding-bottom: 2px;
      }
      #reactionBar button {
        width: auto;
        min-width: 0;
        flex: 1;
        margin: 0;
        min-height: 64px;
        padding: 11px 10px 12px;
        font-size: 24px;
        line-height: 1.2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        -webkit-user-select: none;
        position: relative;
        overflow: visible;
        transform: none;
        transform-origin: center;
        transition: transform 120ms ease, filter 120ms ease, box-shadow 180ms ease;
        backface-visibility: hidden;
      }
      #reactionBar button:active,
      #reactionBar button.reaction-pressed {
        transform: scale(0.93);
        filter: brightness(0.96);
      }
      #reactionBar button.reaction-tap-pop {
        animation: reactionTapPop 220ms cubic-bezier(0.17, 0.89, 0.32, 1.22);
      }
      @keyframes reactionTapPop {
        0% {
          transform: scale(0.93);
        }
        58% {
          transform: scale(1.08);
        }
        100% {
          transform: scale(1);
        }
      }
      #reactionBar button::after {
        content: "";
        position: absolute;
        inset: -6px;
        border-radius: 13px;
        border: 2px solid var(--reaction-impact);
        opacity: 0;
        transform: scale(0.9);
        pointer-events: none;
      }
      #reactionBar button.reaction-impact {
        animation: reactionImpactFlash 320ms ease-out;
      }
      #reactionBar button.reaction-impact::after {
        animation: reactionImpactRing 320ms cubic-bezier(0.1, 0.78, 0.18, 1);
      }
      @keyframes reactionImpactFlash {
        0% {
          box-shadow: 0 0 0 0 var(--reaction-impact);
          filter: brightness(0.98);
        }
        40% {
          box-shadow: 0 0 0 10px var(--reaction-impact-clear);
          filter: brightness(1.08);
        }
        100% {
          box-shadow: 0 0 0 14px var(--reaction-impact-clear);
          filter: brightness(1);
        }
      }
      @keyframes reactionImpactRing {
        0% {
          opacity: 0.62;
          transform: scale(0.9);
        }
        100% {
          opacity: 0;
          transform: scale(1.22);
        }
      }
      .reactionEmoji {
        display: block;
        line-height: 1.25;
        font-size: 1em;
        font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
      }
      .reactionCount {
        display: block;
        font-size: 12px;
        opacity: 0.7;
        margin-top: 0;
        line-height: 1;
      }
      #reactionBurstLayer {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 90px;
        height: 50vh;
        pointer-events: none;
        overflow: hidden;
        z-index: 20;
      }
      .reactionBurst {
        position: absolute;
        bottom: 0;
        font-size: 26px;
        opacity: 0.95;
        animation: burstUp 1500ms ease-out forwards;
        will-change: transform, opacity;
      }
      @keyframes burstUp {
        0% {
          transform: translateY(0) scale(0.9);
          opacity: 0;
        }
        10% {
          opacity: 0.95;
        }
        100% {
          transform: translateY(-220px) scale(1.15) translateX(var(--drift, 0px));
          opacity: 0;
        }
      }
      #pollBox {
        margin-top: 12px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface);
        display: grid;
        gap: 8px;
      }
      #pollBox[hidden] { display: none; }
      #pollQuestion {
        font-weight: 600;
        line-height: 1.3;
      }
      #pollOptions {
        display: grid;
        gap: 6px;
      }
      .pollOption {
        width: 100%;
        text-align: left;
        margin: 0;
        border: 1px solid var(--poll-line);
        border-radius: 8px;
        background: var(--surface-soft);
        color: var(--ink);
        padding: 8px 10px;
      }
      .pollOption.selected {
        border-color: var(--accent);
        background: var(--accent-soft);
      }
      #pollActions {
        display: flex;
        gap: 8px;
      }
      #pollActions button {
        margin: 0;
      }
      #pollMeta {
        font-size: 12px;
        opacity: 0.74;
      }
      #connectionToast {
        position: fixed;
        right: 14px;
        bottom: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        max-width: min(280px, calc(100vw - 28px));
        padding: 8px 10px;
        border-radius: 10px;
        background: var(--toast-bg);
        color: var(--toast-ink);
        font-size: 13px;
        line-height: 1.2;
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
        transition: opacity 180ms ease, transform 180ms ease;
        z-index: 30;
      }
      #connectionToast.show {
        opacity: 1;
        transform: translateY(0);
      }
      #connectionToast.subtle {
        background: var(--toast-subtle-bg);
        font-size: 12px;
        padding: 7px 9px;
      }
      #toastIcon {
        width: 14px;
        text-align: center;
        opacity: 0.92;
      }
      #toastIcon.spin { animation: spin 1s linear infinite; }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        #reactionBar button {
          transition: none;
        }
        #reactionBar button.reaction-tap-pop {
          animation: none;
        }
        #reactionBar button.reaction-impact {
          animation: none;
        }
        #reactionBar button.reaction-impact::after {
          animation: none;
        }
      }
      @media (max-width: 780px) {
        body {
          height: 100dvh;
          min-height: 100dvh;
          overflow: hidden;
          display: flex;
          flex-direction: column;
          gap: 8px;
          padding: calc(10px + env(safe-area-inset-top)) 12px calc(18px + env(safe-area-inset-bottom));
          overscroll-behavior: none;
        }
        .topBar {
          flex: 0 0 auto;
        }
        .topBar h2 {
          margin: 0;
          font-size: 1.3rem;
        }
        #status,
        #nameRow,
        #pollBox,
        #text,
        #send,
        #reactionBar {
          flex: 0 0 auto;
        }
        #nameRow {
          margin: 0;
        }
        #pollBox {
          margin-top: 0;
          max-height: 28dvh;
          overflow: auto;
        }
        #chatFeed {
          order: 5;
          flex: 1 1 auto;
          min-height: 0;
          max-height: none;
          margin-top: 0;
        }
        #text {
          order: 6;
          resize: none;
          max-height: 20dvh;
        }
        #send {
          order: 7;
          margin-top: 0;
        }
        #reactionBar {
          order: 8;
          margin-top: 0;
          margin-bottom: 2px;
          padding-bottom: 4px;
        }
        #reactionBar button {
          min-height: 60px;
          font-size: 22px;
          padding-bottom: 13px;
        }
        #reactionBurstLayer {
          bottom: 136px;
        }
      }
    </style>
  </head>
  <body>
    <div class="topBar">
      <div class="titleWrap">
        <h2>Live reacties</h2>
        <span id="buildBadge" class="buildBadge" title="Build versie">v0.0.----</span>
      </div>
      <details id="settingsMenu">
        <summary aria-label="Instellingen">⚙</summary>
        <div class="settingsContent">
          <button id="themeToggleBtn" type="button">Thema: Auto</button>
          <button id="changeName" type="button">Naam wijzigen</button>
          <button id="toggleDevPanel" type="button">Dev logs tonen</button>
          <div id="devPanel" hidden>
            <button id="refreshServerLog" type="button">Serverlog verversen</button>
            <button id="clearClientLog" type="button">Clientlog legen</button>
            <div class="devLabel">Client log</div>
            <pre id="log" class="devLog">(nog leeg)</pre>
            <div class="devLabel">Server debug.log</div>
            <pre id="serverLog" class="devLog">(nog niet geladen)</pre>
          </div>
        </div>
      </details>
    </div>
    <div id="status">Verbinden…</div>

    <div id="nameRow">
      <span id="nameLabel"></span>
    </div>

    <div id="reactionBar">
      <button type="button" data-reaction="heart" aria-label="Hartje"><span class="reactionEmoji" aria-hidden="true">❤️</span><span class="reactionCount" data-reaction-count="heart">0</span></button>
      <button type="button" data-reaction="fire" aria-label="Vuur"><span class="reactionEmoji" aria-hidden="true">🔥</span><span class="reactionCount" data-reaction-count="fire">0</span></button>
      <button type="button" data-reaction="laugh" aria-label="Lachen"><span class="reactionEmoji" aria-hidden="true">😂</span><span class="reactionCount" data-reaction-count="laugh">0</span></button>
      <button type="button" data-reaction="bored" aria-label="Saai"><span class="reactionEmoji" aria-hidden="true">👎</span><span class="reactionCount" data-reaction-count="bored">0</span></button>
    </div>

    <textarea
      id="text"
      maxlength="140"
      rows="2"
      placeholder="Typ je reactie"
      autocomplete="off"
      aria-autocomplete="none"
      data-lpignore="true"
      autocapitalize="none"
      autocorrect="off"
      spellcheck="false"
      inputmode="text"
      enterkeyhint="send"
    ></textarea>
    <button id="send" disabled>Send</button>
    <div id="pollBox" hidden>
      <div id="pollQuestion"></div>
      <div id="pollOptions"></div>
      <div id="pollActions">
        <button id="pollSubmitBtn" type="button" disabled>Stem</button>
      </div>
      <div id="pollMeta"></div>
    </div>
    <div id="chatFeed"></div>
    <div id="reactionBurstLayer" aria-hidden="true"></div>
    <div id="connectionToast" role="status" aria-live="polite" aria-atomic="true">
      <span id="toastIcon"></span>
      <span id="toastText"></span>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const statusEl = document.getElementById("status");
      const nameLabelEl = document.getElementById("nameLabel");
      const themeToggleBtn = document.getElementById("themeToggleBtn");
      const changeNameBtn = document.getElementById("changeName");
      const toggleDevPanelBtn = document.getElementById("toggleDevPanel");
      const refreshServerLogBtn = document.getElementById("refreshServerLog");
      const clearClientLogBtn = document.getElementById("clearClientLog");
      const settingsMenuEl = document.getElementById("settingsMenu");
      const devPanelEl = document.getElementById("devPanel");
      const logEl = document.getElementById("log");
      const chatFeedEl = document.getElementById("chatFeed");
      const serverLogEl = document.getElementById("serverLog");
      const textEl = document.getElementById("text");
      const sendBtn = document.getElementById("send");
      const reactionBarEl = document.getElementById("reactionBar");
      const reactionBurstLayerEl = document.getElementById("reactionBurstLayer");
      const pollBoxEl = document.getElementById("pollBox");
      const pollQuestionEl = document.getElementById("pollQuestion");
      const pollOptionsEl = document.getElementById("pollOptions");
      const pollSubmitBtn = document.getElementById("pollSubmitBtn");
      const pollMetaEl = document.getElementById("pollMeta");
      const toastEl = document.getElementById("connectionToast");
      const toastIconEl = document.getElementById("toastIcon");
      const toastTextEl = document.getElementById("toastText");
      const buildBadgeEl = document.getElementById("buildBadge");
      const clientTag = Math.random().toString(36).slice(2, 10);
      let lastHttpDebugAt = 0;
      let lastHttpDebugNote = "";
      let ws = null;
      let hasLoadedServerLog = false;
      const CLIENT_LOG_LIMIT = 280;
      const clientLogLines = [];
      const CHAT_LOG_LIMIT = 240;
      const CHAT_HISTORY_LIMIT = 80;
      const CHAT_HISTORY_LOAD_TIMEOUT_MS = 2600;
      const chatLogEntries = [];
      const chatEntryKeys = new Set();
      const reactionCounts = {
        heart: 0,
        fire: 0,
        laugh: 0,
        bored: 0,
      };
      const reactionEmoji = {
        heart: "❤️",
        fire: "🔥",
        laugh: "😂",
        bored: "👎",
      };
      const REACTION_POINTER_GHOST_MS = 700;
      const HEART_HAPTIC_MIN_GAP_MS = 90;
      const REACTION_SEND_STEP_MS = 130;
      const REACTION_QUEUE_MAX = 240;
      let lastReactionPointerAt = 0;
      let lastHeartHapticAt = 0;
      let lastQueuedReactionSendAt = 0;
      const pendingReactionQueue = [];
      let reactionQueueFlushTimer = null;
      const supportsNativeVibration = typeof navigator !== "undefined" && typeof navigator.vibrate === "function";
      let activePoll = null;
      let selectedPollOptionIndex = null;
      let pollVotePending = false;
      let pollCountdownTimer = null;
      const VOTED_POLL_STORAGE_KEY = "live_voted_poll_id";
      const THEME_PREF_KEY = "live_theme_pref_v1";
      const THEME_MODES = ["auto", "light", "dark"];
      const DEBUG_CLIENT_PREF_KEY = "live_client_debug_v1";
      const ENABLE_CLIENT_DEBUG = (() => {
        try {
          const params = new URLSearchParams(window.location.search || "");
          const dbgRaw = String(params.get("dbg") || "").trim().toLowerCase();
          if (dbgRaw === "1" || dbgRaw === "true" || dbgRaw === "on") {
            sessionStorage.setItem(DEBUG_CLIENT_PREF_KEY, "1");
            return true;
          }
          if (dbgRaw === "0" || dbgRaw === "false" || dbgRaw === "off") {
            sessionStorage.setItem(DEBUG_CLIENT_PREF_KEY, "0");
            return false;
          }
          const saved = String(sessionStorage.getItem(DEBUG_CLIENT_PREF_KEY) || "").trim();
          if (saved === "0") return false;
          if (saved === "1") return true;
          return true;
        } catch {
          return true;
        }
      })();
      const systemDarkQuery = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
      let themePreference = "auto";

      function loadThemePreference() {
        const saved = String(localStorage.getItem(THEME_PREF_KEY) || "").toLowerCase();
        return THEME_MODES.includes(saved) ? saved : "auto";
      }

      function saveThemePreference() {
        localStorage.setItem(THEME_PREF_KEY, themePreference);
      }

      function getEffectiveTheme(pref) {
        if (pref === "light") return "light";
        if (pref === "dark") return "dark";
        return systemDarkQuery && systemDarkQuery.matches ? "dark" : "light";
      }

      function updateThemeToggleLabel() {
        const labels = {
          auto: "Thema: Auto",
          light: "Thema: Licht",
          dark: "Thema: Donker",
        };
        themeToggleBtn.textContent = labels[themePreference] || labels.auto;
        themeToggleBtn.setAttribute("aria-label", "Wijzig thema");
        themeToggleBtn.title = "Klik om te wisselen tussen Auto, Licht en Donker";
      }

      function applyTheme(pref, persist = false) {
        themePreference = THEME_MODES.includes(pref) ? pref : "auto";
        const effective = getEffectiveTheme(themePreference);
        document.body.classList.toggle("theme-dark", effective === "dark");
        updateThemeToggleLabel();
        if (persist) saveThemePreference();
      }

      function cycleTheme() {
        const idx = THEME_MODES.indexOf(themePreference);
        const next = THEME_MODES[(idx + 1) % THEME_MODES.length];
        applyTheme(next, true);
      }

      function getStoredVotedPollId() {
        const raw = localStorage.getItem(VOTED_POLL_STORAGE_KEY);
        const parsed = Number.parseInt(String(raw || ""), 10);
        return Number.isInteger(parsed) ? parsed : null;
      }

      function setStoredVotedPollId(pollId) {
        if (!Number.isInteger(Number(pollId))) return;
        localStorage.setItem(VOTED_POLL_STORAGE_KEY, String(Number(pollId)));
      }

      function clearStoredVotedPollId() {
        localStorage.removeItem(VOTED_POLL_STORAGE_KEY);
      }

      function formatCountdownMs(ms) {
        const value = Number(ms || 0);
        if (!Number.isFinite(value) || value <= 0) return "0:00";
        const totalSeconds = Math.ceil(value / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return String(minutes) + ":" + String(seconds).padStart(2, "0");
      }

      function getPollRemainingMs() {
        if (!activePoll || !Number.isFinite(Number(activePoll.endsAtMs))) return null;
        return Math.max(0, Number(activePoll.endsAtMs) - Date.now());
      }

      function stopPollCountdownLoop() {
        if (!pollCountdownTimer) return;
        clearInterval(pollCountdownTimer);
        pollCountdownTimer = null;
      }

      function startPollCountdownLoop() {
        stopPollCountdownLoop();
        if (!activePoll || !Number.isFinite(Number(activePoll.endsAtMs))) return;
        pollCountdownTimer = setInterval(() => {
          if (!activePoll) {
            stopPollCountdownLoop();
            return;
          }
          renderPollOptions();
          renderPollMeta();
        }, 1000);
      }

      function log(line) {
        clientLogLines.unshift(line);
        if (clientLogLines.length > CLIENT_LOG_LIMIT) {
          clientLogLines.length = CLIENT_LOG_LIMIT;
        }
        logEl.textContent = clientLogLines.length ? clientLogLines.join("\n") : "(nog leeg)";
      }

      function sanitizeNameColor(input) {
        const value = String(input || "").trim();
        return /^#[0-9a-fA-F]{6}$/.test(value) ? value : "";
      }

      function normalizeRankBadge(input) {
        const raw = String(input || "").trim();
        if (raw === "👑" || raw === "🥈" || raw === "🥉") return raw;
        return "";
      }

      function renderChatFeed() {
        chatFeedEl.textContent = "";
        const fragment = document.createDocumentFragment();
        for (const entry of chatLogEntries) {
          const row = document.createElement("div");
          row.className = "chatLine";

          if (entry && entry.type === "comment") {
            if (entry.systemNotice) {
              row.textContent = String(entry.text || "");
              fragment.appendChild(row);
              continue;
            }
            const nameNode = document.createElement("span");
            nameNode.className = "chatName";
            const rankBadge = normalizeRankBadge(entry.rankBadge);
            const nameLabel = rankBadge
              ? `${rankBadge} ${String(entry.name || "Anoniem")}`
              : String(entry.name || "Anoniem");
            nameNode.textContent = nameLabel;
            if (entry.nameColor) nameNode.style.color = entry.nameColor;

            const textNode = document.createElement("span");
            textNode.textContent = ": " + String(entry.text || "");

            row.appendChild(nameNode);
            row.appendChild(textNode);
          } else {
            row.textContent = String((entry && entry.text) || "");
          }

          fragment.appendChild(row);
        }
        chatFeedEl.appendChild(fragment);
      }

      function buildChatEntryKey(entry) {
        const time = String((entry && entry.time) || "").trim();
        const text = String((entry && entry.text) || "").trim();
        if (!time || !text) return "";
        const name = String((entry && entry.name) || "Anoniem").slice(0, 24);
        const nameColor = sanitizeNameColor(entry && entry.nameColor);
        const rankBadge = normalizeRankBadge(entry && entry.rankBadge);
        const systemNotice = entry && entry.systemNotice ? "1" : "0";
        return [time, name, text, nameColor, rankBadge, systemNotice].join("|");
      }

      function pushChatEntry(entry, { render = true } = {}) {
        chatLogEntries.unshift(entry);
        const entryKey = String((entry && entry._chatKey) || "");
        if (entryKey) chatEntryKeys.add(entryKey);
        if (chatLogEntries.length > CHAT_LOG_LIMIT) {
          const removedEntries = chatLogEntries.splice(CHAT_LOG_LIMIT);
          for (const removedEntry of removedEntries) {
            const removedKey = String((removedEntry && removedEntry._chatKey) || "");
            if (removedKey) chatEntryKeys.delete(removedKey);
          }
        }
        if (render) renderChatFeed();
        return true;
      }

      function appendChat(line, options = {}) {
        const text = String(line || "").trim();
        if (!text) return false;
        return pushChatEntry({ type: "text", text }, options);
      }

      function appendChatComment(msg, options = {}) {
        const text = String((msg && msg.text) || "").trim();
        if (!text) return false;
        const name = String((msg && msg.name) || "Anoniem").slice(0, 24);
        const nameColor = sanitizeNameColor(msg && msg.nameColor);
        const rankBadge = normalizeRankBadge(msg && msg.rankBadge);
        const systemNotice = !!(msg && msg.system);
        const time = String((msg && msg.time) || "").trim();
        const key = buildChatEntryKey({
          time,
          name,
          text,
          nameColor,
          rankBadge,
          systemNotice,
        });
        if (key && chatEntryKeys.has(key)) return false;
        return pushChatEntry({
          type: "comment",
          time,
          name,
          text,
          nameColor,
          rankBadge,
          systemNotice,
          _chatKey: key,
        }, options);
      }

      function updateReactionCounterUi() {
        const nodes = document.querySelectorAll("[data-reaction-count]");
        for (const node of nodes) {
          const key = String(node.getAttribute("data-reaction-count") || "");
          if (!(key in reactionCounts)) continue;
          node.textContent = String(Number(reactionCounts[key] || 0));
        }
      }

      function setReactionCounts(nextCounts) {
        if (!nextCounts || typeof nextCounts !== "object") return;
        for (const key of Object.keys(reactionCounts)) {
          reactionCounts[key] = Number(nextCounts[key] || 0);
        }
        updateReactionCounterUi();
      }

      function spawnReactionBurst(reactionKey, intensity = 1) {
        const emoji = reactionEmoji[reactionKey];
        if (!emoji || !reactionBurstLayerEl) return;
        const count = Math.max(1, Math.min(4, Number(intensity) || 1));
        for (let i = 0; i < count; i += 1) {
          const node = document.createElement("span");
          node.className = "reactionBurst";
          node.textContent = emoji;
          const leftPct = 8 + Math.random() * 84;
          const drift = -36 + Math.random() * 72;
          node.style.left = leftPct.toFixed(2) + "%";
          node.style.setProperty("--drift", drift.toFixed(0) + "px");
          reactionBurstLayerEl.appendChild(node);
          setTimeout(() => node.remove(), 1600);
        }
      }

      function sendReaction(reactionKey) {
        if (!reactionEmoji[reactionKey]) return;
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          appendChat("Offline");
          ensureFreshConnection();
          return;
        }
        enqueueReactionForSend(reactionKey);
        try {
          reactionCounts[reactionKey] = Number(reactionCounts[reactionKey] || 0) + 1;
          updateReactionCounterUi();
          spawnReactionBurst(reactionKey, 1);
          if (reactionKey === "heart" && supportsNativeVibration) {
            const pulseNow = Date.now();
            if (pulseNow - lastHeartHapticAt >= HEART_HAPTIC_MIN_GAP_MS) {
              lastHeartHapticAt = pulseNow;

        for (let index = 0; index < activePoll.options.length; index += 1) {

      function showPoll(poll) {

          activePoll = null;
          selectedPollOptionIndex = null;

          stopPollCountdownLoop();

          pollVotePending = false;
          pollBoxEl.hidden = true;

        activePoll = {
          id: incomingPollId,
          question: String(poll.question),
          options: poll.options.map((o) => String(o)),
          counts: Array.isArray(poll.counts) ? poll.counts.map((n) => Number(n || 0)) : poll.options.map(() => 0),
          totalVotes: Number(poll.totalVotes || 0),
          endsAtMs: (() => {
            const directTs = Date.parse(String(poll.endsAt || ""));
            if (Number.isFinite(directTs)) return directTs;
            const startedAtTs = Date.parse(String(poll.startedAt || ""));
            const durationSeconds = Number(poll.durationSeconds || 0);
            if (Number.isFinite(startedAtTs) && Number.isFinite(durationSeconds) && durationSeconds > 0) {
              return startedAtTs + durationSeconds * 1000;
            }
            return null;
          })(),

      function sendDebugOverHttp(note) {
        if (!ENABLE_CLIENT_DEBUG) return;
        const now = Date.now();
        if (note === lastHttpDebugNote && now - lastHttpDebugAt < 1200) return;
        lastHttpDebugNote = note;
        lastHttpDebugAt = now;

        const state = [
          "ws=" + (ws ? ws.readyState : -1),
          "vis=" + document.visibilityState,
          "online=" + (navigator.onLine ? "1" : "0"),
        ].join(" ");
        const payload = JSON.stringify({ clientTag, state, note });

        if (typeof navigator.sendBeacon === "function") {
          try {
            const blob = new Blob([payload], { type: "application/json" });
            if (navigator.sendBeacon("/client-debug", blob)) return;
          } catch {}
        }

        fetch("/client-debug", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: payload,
          keepalive: true,
          cache: "no-store",
        }).catch(() => {});
      }

            return;
          } catch {}

      function clearPendingReactionQueue() {
        pendingReactionQueue.length = 0;
        lastQueuedReactionSendAt = 0;

          clearInterval(reactionQueueFlushTimer);
          reactionQueueFlushTimer = null;
        }
      }

      function flushReactionQueue(force = false) {
        if (!pendingReactionQueue.length) {
          if (reactionQueueFlushTimer) {
            clearInterval(reactionQueueFlushTimer);
            reactionQueueFlushTimer = null;
          }
          return;
        }
        if (!ws || ws.readyState !== WebSocket.OPEN || pausedByServer) return;
        const now = Date.now();
        if (!force && now - lastQueuedReactionSendAt < REACTION_SEND_STEP_MS) return;
        const reactionKey = pendingReactionQueue.shift();
        if (!reactionEmoji[reactionKey]) return;
        try {
          ws.send(JSON.stringify({ type: "reaction", reaction: reactionKey, clientTag }));
          lastQueuedReactionSendAt = now;
        } catch {
          pendingReactionQueue.unshift(reactionKey);
        }
      }

      function startReactionQueueLoop() {
        if (reactionQueueFlushTimer) return;
        reactionQueueFlushTimer = setInterval(() => {
          flushReactionQueue(false);
        }, 40);
      }

      function enqueueReactionForSend(reactionKey) {
        if (!reactionEmoji[reactionKey]) return;
        if (pendingReactionQueue.length >= REACTION_QUEUE_MAX) {
          pendingReactionQueue.shift();
        }
        pendingReactionQueue.push(reactionKey);
        startReactionQueueLoop();
        flushReactionQueue(false);

      function formatRemainingMs(ms) {
        const value = Number(ms || 0);
        if (!Number.isFinite(value) || value <= 0) return "";
        const totalSeconds = Math.ceil(value / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        if (minutes <= 0) return totalSeconds + "s";
        if (seconds === 0) return minutes + "m";
        return minutes + "m " + seconds + "s";
      }

          const untilTs = Date.parse(String(msg.mutedUntil));
          if (Number.isFinite(untilTs)) {

          ? "Je bent tijdelijk gemute door de moderator. Nog " + remaining + "."

      const CONNECT_TIMEOUT_MS = 7000;
      const CONNECTION_CHECK_MS = 2000;
      const MAX_RECONNECT_DELAY_MS = 8000;
      const STALE_CONNECTION_MS = 15000;
      const HEALTH_PROBE_MS = 3000;
      const HEALTH_TIMEOUT_MS = 2500;
      const PROBE_STALE_OPEN_MS = 7000;
      const SOCKET_CONNECTING = typeof WebSocket !== "undefined" ? WebSocket.CONNECTING : 0;
      const SOCKET_OPEN = typeof WebSocket !== "undefined" ? WebSocket.OPEN : 1;
      const SOCKET_CLOSING = typeof WebSocket !== "undefined" ? WebSocket.CLOSING : 2;
      const SOCKET_CLOSED = typeof WebSocket !== "undefined" ? WebSocket.CLOSED : 3;

      function createSocketIoCompatSocket(wsUrl) {
        if (typeof window.io !== "function") {
          throw new Error("socket.io_client_missing");
        }
        const listeners = {
          open: new Set(),
          close: new Set(),
          error: new Set(),
          message: new Set(),
        };
        const ioSocket = window.io({
          path: "/socket.io",
          transports: ["polling"],
          upgrade: false,
          reconnection: false,
          forceNew: true,
          withCredentials: true,
        });

        let readyState = SOCKET_CONNECTING;
        let closeCode = 1001;
        let closeReason = "";

        function emit(type, payload) {
          const handlers = listeners[type];
          if (!handlers || !handlers.size) return;
          for (const handler of Array.from(handlers)) {
            try {
              handler(payload || {});
            } catch {}
          }
        }

        function setCloseInfo(code, reason) {
          const parsedCode = Number.parseInt(String(code), 10);
          closeCode = Number.isInteger(parsedCode) && parsedCode >= 1000 && parsedCode <= 4999 ? parsedCode : 1001;
          closeReason = String(reason || "").slice(0, 120);
        }

        const compatSocket = {
          get readyState() {
            return readyState;
          },
          addEventListener(type, handler) {
            if (!listeners[type] || typeof handler !== "function") return;
            listeners[type].add(handler);
          },
          removeEventListener(type, handler) {
            if (!listeners[type] || typeof handler !== "function") return;
            listeners[type].delete(handler);
          },
          send(payload) {
            if (readyState !== SOCKET_OPEN) throw new Error("socket_not_open");
            const data = typeof payload === "string" ? payload : JSON.stringify(payload);
            ioSocket.emit("ws_message", data);
          },
          close(code = 1000, reason = "") {
            if (readyState === SOCKET_CLOSING || readyState === SOCKET_CLOSED) return;
            setCloseInfo(code, reason);
            readyState = SOCKET_CLOSING;
            try {
              ioSocket.emit("ws_close", { code: closeCode, reason: closeReason });
            } catch {}
            try {
              ioSocket.disconnect();
            } catch {}
          },
        };

        ioSocket.on("connect", () => {
          if (readyState === SOCKET_CLOSED) return;
          readyState = SOCKET_OPEN;
          emit("open", {});
        });

        ioSocket.on("ws_message", (payload) => {
          if (readyState !== SOCKET_OPEN) return;
          const data = typeof payload === "string" ? payload : JSON.stringify(payload || {});
          emit("message", { data });
        });

        ioSocket.on("ws_close", (payload) => {
          const info = payload && typeof payload === "object" ? payload : {};
          setCloseInfo(info.code, info.reason);
          if (readyState !== SOCKET_CLOSED) {
            readyState = SOCKET_CLOSING;
          }
          try {
            ioSocket.disconnect();
          } catch {}
        });

        const forwardError = (err) => {
          const message = err && err.message ? String(err.message) : "";
          emit("error", { error: err, message });
        };
        ioSocket.on("connect_error", forwardError);
        ioSocket.on("error", forwardError);

        ioSocket.on("disconnect", (reason) => {
          if (readyState === SOCKET_CLOSED) return;
          if (readyState !== SOCKET_CLOSING) {
            const transportReason = String(reason || "").toLowerCase();
            if (transportReason.includes("ping timeout") || transportReason.includes("transport")) {
              setCloseInfo(1006, reason);
            } else {
              setCloseInfo(1001, reason);
            }
          }
          readyState = SOCKET_CLOSED;
          const reasonText = closeReason || String(reason || "").slice(0, 120);
          emit("close", {
            code: closeCode,
            reason: reasonText,
            wasClean: closeCode !== 1006,
          });
        });

        return compatSocket;
      }

      function createTransportSocket(wsUrl) {
        if (typeof window.io === "function") {
          debugLog("transport: socket.io polling");
          return createSocketIoCompatSocket(wsUrl);
        }
        debugLog("transport: websocket fallback (io missing)");
        return new WebSocket(wsUrl);
      }

      function clearConnectTimeout() {
        if (!connectTimeoutTimer) return;
        clearTimeout(connectTimeoutTimer);
        connectTimeoutTimer = null;
      }

      function clearReconnectTimer() {
        if (!reconnectTimer) return;
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }

      function resetReconnectBackoff() {
        reconnectDelayMs = 500;
        pendingReconnect = false;
        clearReconnectTimer();
      }

      function connectNow(reason) {
        if (pausedByServer) return;
        if (pageDeactivating) return;
        if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.CLOSING)) {
          debugLog(reason + " -> skip connect (socket busy)");
          return;
        }
        pendingReconnect = false;
        clearReconnectTimer();
        debugLog(reason + " -> connect now");
        connect();
      }

      function scheduleReconnect(reason) {
        if (pausedByServer) return;
        if (pageDeactivating) return;
        pendingReconnect = true;
        if (document.visibilityState !== "visible") {
          debugLog(reason + " -> defer reconnect (hidden)");
          return;
        }
        if (reconnectTimer) return;
        const delay = reconnectDelayMs;
        debugLog(reason + " -> reconnect in " + delay + "ms");
        reconnectTimer = setTimeout(() => {
          reconnectTimer = null;
          if (!pendingReconnect) return;
          pendingReconnect = false;
          connect();
        }, delay);
        reconnectDelayMs = Math.min(
          MAX_RECONNECT_DELAY_MS,
          Math.round(reconnectDelayMs * 1.6 + 120)
        );
      }

      function noteServerSeen() {
        lastServerSeenAt = Date.now();
        healthProbeFailCount = 0;
      }

      function buildHardReloadUrl() {
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("_r", String(Date.now()));
        return nextUrl.toString();
      }

      function normalizeBuildLabel(version, label) {
        const direct = String(label || "").trim();
        if (direct) return direct.slice(0, 40);
        const fallback = String(version || "").trim();
        if (fallback) return fallback.slice(0, 40);
        return "";
      }

      function applyBuildLabel(version, label, source = "unknown") {
        if (!buildBadgeEl) return;
        const next = normalizeBuildLabel(version, label);
        if (!next) return;
        currentBuildLabel = next;
        buildBadgeEl.textContent = next;
        buildBadgeEl.title = "Build: " + next + " (" + String(source || "unknown") + ")";
      }

      function hardReloadForServerInstanceChange(reason) {
        if (hardReloadInProgress) return;
        hardReloadInProgress = true;
        showUserNotice("Nieuwe serverversie actief. Pagina ververst...", { autoHideMs: 1800 });
        debugLog("hard reload for server instance change (" + String(reason || "unknown") + ")");
        setTimeout(() => {
          window.location.replace(buildHardReloadUrl());
        }, 80);
      }

      function observeServerInstanceId(nextId, source = "socket") {
        const value = String(nextId || "").trim();
        if (!value) return;
        if (!serverInstanceId) {
          serverInstanceId = value;
          return;
        }
        if (serverInstanceId !== value) {
          hardReloadForServerInstanceChange(source);
        }
      }

      function probeHealth(reason) {
        if (pausedByServer) return;
        if (pageDeactivating) return;
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        if (healthProbeInFlight) return;
        healthProbeInFlight = true;

        const controller = new AbortController();
        const timeoutId = setTimeout(() => {
          try { controller.abort(); } catch {}
        }, HEALTH_TIMEOUT_MS);

        fetch("/health?ts=" + Date.now(), {
          cache: "no-store",
          signal: controller.signal,
        })
          .then((res) => {
            clearTimeout(timeoutId);
            healthProbeInFlight = false;
            if (!res.ok) throw new Error("bad status");
            return res.json().catch(() => ({}));
          })
          .then((body) => {
            healthProbeFailCount = 0;
            observeServerInstanceId(body && body.instanceId, "health");
            applyBuildLabel(body && body.buildVersion, body && body.buildLabel, "health");
            const openButStale = ws
              && ws.readyState === WebSocket.OPEN
              && lastServerSeenAt
              && Date.now() - lastServerSeenAt > PROBE_STALE_OPEN_MS;
            if (openButStale) {
              debugLog(reason + " health ok + stale open -> reset socket");
              try { ws.close(); } catch {}
              ws = null;
              connectNow(reason + " health");
            }
          })
          .catch(() => {
            clearTimeout(timeoutId);
            healthProbeInFlight = false;
            healthProbeFailCount += 1;
            if (healthProbeFailCount === 1 || healthProbeFailCount % 4 === 0) {
              debugLog(reason + " health failed x" + healthProbeFailCount);
            }
          });
      }

      function startHealthProbeLoop() {
        if (healthProbeTimer) return;
        healthProbeTimer = setInterval(() => {
          if (pausedByServer) return;
          if (document.visibilityState !== "visible") return;
          if (!ws || ws.readyState !== WebSocket.OPEN) return;
          const staleOpen = ws
            && ws.readyState === WebSocket.OPEN
            && lastServerSeenAt
            && Date.now() - lastServerSeenAt > PROBE_STALE_OPEN_MS;
          if (!staleOpen) return;

          probeHealth("probe_loop");
        }, HEALTH_PROBE_MS);
      }

      function forceCloseAndReconnect(reason) {
        if (!ws) return;
        const socket = ws;
        if (socket.readyState === WebSocket.CLOSING || socket.readyState === WebSocket.CLOSED) return;
        if (Date.now() - forceCloseAt < 1200) return;

        forceCloseAt = Date.now();
        debugLog(reason + " -> close socket");
        clearConnectTimeout();
        try { socket.close(); } catch {}

        // Safari can keep sockets in limbo; force reset if close event never arrives.
        setTimeout(() => {
          if (ws !== socket) return;
          if (socket.readyState === WebSocket.OPEN) return;
          debugLog("force close fallback -> reset socket");
          ws = null;
          scheduleReconnect("force close fallback");
        }, 2200);
      }

      function registerConnectFailure(reason) {
        consecutiveConnectFailures += 1;
        debugLog(reason + " (failures=" + consecutiveConnectFailures + ")");
      }

      function stopHeartbeat() {
        if (heartbeatTimer) {
          clearInterval(heartbeatTimer);
          heartbeatTimer = null;
        }
        if (pongTimeoutTimer) {
          clearTimeout(pongTimeoutTimer);
          pongTimeoutTimer = null;
        }
      }

      function startHeartbeat() {
        stopHeartbeat();
        debugLog("heartbeat started");
        heartbeatTimer = setInterval(() => {
          if (!ws || ws.readyState !== WebSocket.OPEN) return;

          try {
            ws.send(JSON.stringify({ type: "ping" }));
            debugLog("heartbeat ping sent");
          } catch {}

          if (pongTimeoutTimer) clearTimeout(pongTimeoutTimer);
          pongTimeoutTimer = setTimeout(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
              debugLog("heartbeat pong timeout -> close socket");
              try { ws.close(); } catch {}
            }
          }, 3500);
        }, 6000);
      }

      function ensureFreshConnection() {
        if (pausedByServer) return;
        if (pageDeactivating) return;
        if (pendingReconnect || reconnectTimer) return;
        if (!ws) {
          debugLog("ensureFreshConnection: no socket -> connect");
          connectNow("ensureFreshConnection: no socket");
          return;
        }
        if (ws.readyState === WebSocket.CONNECTING) {
          const elapsed = Date.now() - connectStartedAt;
          if (connectStartedAt && elapsed > CONNECT_TIMEOUT_MS + 1000) {
            forceCloseAndReconnect("ensureFreshConnection: stale connecting");
            return;
          }
          return;
        }
        if (ws.readyState === WebSocket.OPEN) {
          if (lastServerSeenAt && Date.now() - lastServerSeenAt > STALE_CONNECTION_MS) {
            forceCloseAndReconnect("ensureFreshConnection: stale open");
          }
          return;
        }
        if (ws.readyState === WebSocket.CLOSING) {
          return;
        }
        if (ws.readyState === WebSocket.CLOSED) {
          debugLog("ensureFreshConnection: socket not open -> recreate");
          try { ws.close(); } catch {}
          ws = null;
          connectNow("ensureFreshConnection: recreate");
          return;
        }
      }

      function setUiConnected(connected, { notify = true } = {}) {
        statusEl.textContent = connected ? "Connected" : "Disconnected, reconnecting";
        sendBtn.disabled = !connected;
        if (!notify) return;

        if (connected) {
          hideToast();
          if (!hasShownConnectedToast) {
            showToast("Connected", { subtle: true, autoHideMs: 1800 });
            hasShownConnectedToast = true;
          }
        } else {
          showToast("Disconnected, reconnecting", { subtle: true, spinning: true });
        }
      }

      function startConnectionManager() {
        if (connectionManagerTimer) return;
        connectionManagerTimer = setInterval(() => {
          if (pageDeactivating) return;
          if (document.visibilityState !== "visible") return;
          ensureFreshConnection();
        }, CONNECTION_CHECK_MS);
      }

      function fetchBuildLabelOnce() {
        fetch("/health?build=1&ts=" + Date.now(), {
          cache: "no-store",
        })
          .then((res) => {
            if (!res.ok) throw new Error("bad status");
            return res.json().catch(() => ({}));
          })
          .then((body) => {
            observeServerInstanceId(body && body.instanceId, "build_probe");
            applyBuildLabel(body && body.buildVersion, body && body.buildLabel, "build_probe");
          })
          .catch(() => {});
      }

      async function loadChatHistory() {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => {
          try { controller.abort(); } catch {}
        }, CHAT_HISTORY_LOAD_TIMEOUT_MS);
        try {
          const response = await fetch(
            "/chat/history?limit=" + CHAT_HISTORY_LIMIT + "&ts=" + Date.now(),
            {
              cache: "no-store",
              signal: controller.signal,
            }
          );
          if (!response.ok) {
            if (response.status !== 403 && response.status !== 410) {
              debugLog("chat history http status " + response.status);
            }
            return;
          }
          const payload = await response.json().catch(() => null);
          const messages = payload && Array.isArray(payload.messages) ? payload.messages : [];
          if (!messages.length) return;
          let appended = 0;
          for (const message of messages) {
            if (appendChatComment(message, { render: false })) appended += 1;
          }
          if (appended > 0) renderChatFeed();
        } catch (err) {
          if (err && err.name === "AbortError") return;
          debugLog("chat history load failed");
        } finally {
          clearTimeout(timeoutId);
        }
      }

      function handleServerError(msg) {
        const code = String(msg.code || "");
        if (code === "moderation_blocked") {
          appendChat("Bericht verwijderd vanwege ongewenst taalgebruik.");
          return;
        }
        if (code === "link_blocked") {
          appendChat("Bericht verwijderd: links zijn niet toegestaan.");
          return;
        }
        if (code === "phone_blocked") {
          appendChat("Bericht verwijderd: telefoonnummers zijn niet toegestaan.");
          return;
        }
        if (code === "name_blocked" || code === "name_link_blocked" || code === "name_phone_blocked") {
          const messageByCode = {
            name_blocked: "Gebruikersnaam bevat ongewenst taalgebruik.",
            name_link_blocked: "Gebruikersnaam mag geen links bevatten.",
            name_phone_blocked: "Gebruikersnaam mag geen telefoonnummers bevatten.",
          };
          appendChat(messageByCode[code] || "Gebruikersnaam is niet toegestaan.");
          setTimeout(() => {
            changeName();
            myName = sanitizeNameClient(localStorage.getItem("live_name"));
          }, 60);
          return;
        }
        if (code === "user_muted") {
          clearPendingReactionQueue();
          resetPollVotePending();
          showUserNotice(buildMuteNoticeText(msg));
          return;
        }
        if (code === "session_join_required") {
          clearPendingReactionQueue();
          pausedByServer = true;
          serverPauseReason = "join_required";
          pendingReconnect = false;
          clearReconnectTimer();
          stopHeartbeat();
          connectStartedAt = 0;
          sendBtn.disabled = true;
          showUserNotice("Deze sessie vereist een nieuwe join-link. Scan de nieuwste QR-code.", { autoHideMs: 5600 });
          return;
        }
        if (code === "session_inactive") {
          clearPendingReactionQueue();
          pausedByServer = true;
          serverPauseReason = "session_inactive";
          pendingReconnect = false;
          clearReconnectTimer();
          stopHeartbeat();
          connectStartedAt = 0;
          sendBtn.disabled = true;
          showUserNotice("Deze sessie is beëindigd. Wacht op een nieuwe QR-code.", { autoHideMs: 5600 });
          return;
        }
        if (code === "user_blocked") {
          clearPendingReactionQueue();
          resetPollVotePending();
          showUserNotice("Je bent geblokkeerd door de moderator.");
          return;
        }
        if (code === "kicked") {
          showUserNotice("Je bent verwijderd door de moderator.");
          return;
        }
        if (code === "user_unmuted") {
          showUserNotice("Je mute is opgeheven. Je kunt weer reageren.", { autoHideMs: 3600 });
          return;
        }
        if (code === "poll_vote_invalid") {
          resetPollVotePending();
          appendChat("Kon je stem niet verwerken.");
          return;
        }
        if (code === "poll_vote_locked") {
          if (activePoll && Number.isInteger(Number(activePoll.id))) {
            setStoredVotedPollId(Number(activePoll.id));
          }
          closePoll();
          appendChat("Je stem was al opgeslagen.");
          return;
        }

        appendChat("ERROR: " + String(msg.message || "unknown"));
      }

      function handleModerationNotice(msg) {
        const code = String(msg.code || "");
        if (code === "user_muted") {
          showUserNotice(buildMuteNoticeText(msg));
          return;
        }
        if (code === "user_unmuted") {
          showUserNotice("Je mute is opgeheven. Je kunt weer reageren.", { autoHideMs: 3600 });
          return;
        }
        if (code === "user_blocked") {
          showUserNotice("Je bent geblokkeerd door de moderator en wordt verwijderd.", { autoHideMs: 5000 });
          return;
        }
        if (code === "kicked") {
          showUserNotice("Je bent verwijderd door de moderator.", { autoHideMs: 4200 });
          return;
        }
        if (msg.message) {
          showUserNotice(String(msg.message));
        }
      }

      function connect() {
        if (pausedByServer) return;
        if (pageDeactivating) return;
        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.CLOSING)) return;
        debugLog("connect() called");

        const wsBaseUrl = (location.protocol === "https:" ? "wss://" : "ws://") + location.host;
        const wsUrl = wsBaseUrl + "/?sid=" + Date.now();
        debugLog("connecting to " + wsUrl + " via socket.io");

        let socket;
        let opened = false;
        let openedAt = 0;
        try {
          socket = createTransportSocket(wsUrl);
          ws = socket;
          connectStartedAt = Date.now();
        } catch {
          debugLog("transport create failed");
          setUiConnected(false);
          registerConnectFailure("transport create failed");
          scheduleReconnect("transport create failed");
          return;
        }

        setUiConnected(false, { notify: false });
        clearConnectTimeout();
        connectTimeoutTimer = setTimeout(() => {
          if (socket !== ws) return;
          if (socket.readyState === WebSocket.CONNECTING) {
            registerConnectFailure("connect timeout");
            forceCloseAndReconnect("connect timeout");
            setUiConnected(false);
            scheduleReconnect("connect timeout");
          }
        }, CONNECT_TIMEOUT_MS);

        socket.addEventListener("open", () => {
          if (socket !== ws) return;
          opened = true;
          openedAt = Date.now();
          consecutiveConnectFailures = 0;
          forceCloseAt = 0;
          noteServerSeen();
          resetReconnectBackoff();
          debugLog("ws open");
          clearConnectTimeout();
          stopHeartbeat();
          connectStartedAt = 0;
          setUiConnected(true);
          startHeartbeat();
          try {
            const currentName = sanitizeNameClient(localStorage.getItem("live_name")) || myName;
            socket.send(JSON.stringify({ type: "register", clientTag, name: currentName }));
          } catch {}
          flushReactionQueue(true);
        });

        socket.addEventListener("close", (ev) => {
          if (socket !== ws) return;
          const closedBySessionControl = ev.code === 4010 || ev.code === 4011 || ev.code === 4008 || ev.code === 4009;
          if (closedBySessionControl || pausedByServer) {
            clearPendingReactionQueue();
            debugLog("ws close code=" + ev.code + " -> paused by server");
            clearConnectTimeout();
            stopHeartbeat();
            connectStartedAt = 0;
            ws = null;
            pendingReconnect = false;
            clearReconnectTimer();
            setUiConnected(false, { notify: false });
            const pauseReason = serverPauseReason
              || (ev.code === 4008 ? "join_required" : "")
              || (ev.code === 4009 || ev.code === 4011 ? "session_inactive" : "");
            const pausedMessage = pauseReason === "join_required"
              ? "Sessie vergrendeld. Scan de nieuwste QR-link om opnieuw mee te doen."
              : pauseReason === "session_inactive"
                ? "Sessie beëindigd. Wacht op een nieuwe QR-link."
                : "Sessie gesloten. Ververs om opnieuw mee te doen.";
            showToast(pausedMessage, { subtle: false });
            sendBtn.disabled = true;
            return;
          }
          if (!opened || (openedAt && Date.now() - openedAt < 1500)) {
            registerConnectFailure("ws close shortly after connect");
          }
          forceCloseAt = 0;
          debugLog("ws close code=" + ev.code + " clean=" + (ev.wasClean ? "1" : "0"));
          clearConnectTimeout();
          stopHeartbeat();
          connectStartedAt = 0;
          ws = null;
          setUiConnected(false);
          scheduleReconnect("ws close code=" + ev.code);
        });

        socket.addEventListener("error", (ev) => {
          if (socket !== ws) return;
          if (!opened) registerConnectFailure("ws error before open");
          forceCloseAt = 0;
          const errMsg = ev && typeof ev === "object"
            && ev.message ? String(ev.message)
            : ev && ev.error && ev.error.message ? String(ev.error.message)
            : "";
          debugLog(errMsg ? "ws error (" + errMsg + ")" : "ws error");
          clearConnectTimeout();
          stopHeartbeat();
          connectStartedAt = 0;
          ws = null;
          setUiConnected(false);
          try { socket.close(); } catch {}
          scheduleReconnect("ws error");
        });

        socket.addEventListener("message", (ev) => {
          if (socket !== ws) return;
          try {
            const msg = JSON.parse(ev.data);
            if (msg.type === "hello") {
              observeServerInstanceId(msg.serverInstanceId, "ws_hello");
              applyBuildLabel(msg.buildVersion, msg.buildLabel, "ws_hello");
              noteServerSeen();
              if (msg.poll) showPoll(msg.poll);
              return;
            }
            if (msg.type === "pong") {
              debugLog("pong received");
              if (pongTimeoutTimer) {
                clearTimeout(pongTimeoutTimer);
                pongTimeoutTimer = null;
              }
              noteServerSeen();
              return;
            }
            if (msg.type === "comment") {
              appendChatComment(msg);
              noteServerSeen();
              return;
            }
            if (msg.type === "poll_started") {
              if (msg.poll && Number.isInteger(Number(msg.poll.id))) {
                const stored = getStoredVotedPollId();
                if (stored !== Number(msg.poll.id)) clearStoredVotedPollId();
              }
              showPoll(msg.poll || null);
              appendChat("Nieuwe poll gestart.");
              noteServerSeen();
              return;
            }
            if (msg.type === "poll_update") {
              if (activePoll && Number(msg.pollId) === Number(activePoll.id)) {
                activePoll.counts = Array.isArray(msg.counts)
                  ? msg.counts.map((n) => Number(n || 0))
                  : activePoll.counts;
                activePoll.totalVotes = Number(msg.totalVotes || 0);
                renderPollOptions();
                renderPollMeta();
              }
              noteServerSeen();
              return;
            }
            if (msg.type === "poll_vote_ok") {
              const votedPollId = Number(msg.pollId);
              if (Number.isInteger(votedPollId)) setStoredVotedPollId(votedPollId);
              closePoll();
              appendChat("Je stem is opgeslagen.");
              noteServerSeen();
              return;
            }
            if (msg.type === "poll_closed") {
              const closedId = Number(msg.pollId);
              if (Number.isInteger(closedId) && getStoredVotedPollId() === closedId) {
                clearStoredVotedPollId();
              }
              closePoll();
              appendChat(msg.reason === "timeout" ? "Poll afgelopen." : "Poll gesloten.");
              noteServerSeen();
              return;
            }
            if (msg.type === "session_reset") {
              clearPendingReactionQueue();
              pausedByServer = true;
              serverPauseReason = "session_reset";
              setReactionCounts({ heart: 0, fire: 0, laugh: 0, bored: 0 });
              clearStoredVotedPollId();
              closePoll();
              appendChat("Nieuwe sessie gestart. Herverbinden...");
              noteServerSeen();
              return;
            }
            if (msg.type === "session_closed") {
              clearPendingReactionQueue();
              pausedByServer = true;
              serverPauseReason = "session_inactive";
              setReactionCounts({ heart: 0, fire: 0, laugh: 0, bored: 0 });
              clearStoredVotedPollId();
              closePoll();
              appendChat("Sessie beëindigd. Wacht op een nieuwe join-link.");
              noteServerSeen();
              return;
            }
            if (msg.type === "moderation_notice") {
              handleModerationNotice(msg);
              noteServerSeen();
              return;
            }
            if (msg.type === "server_notice") {
              const code = String(msg.code || "").trim().toLowerCase();
              if (code === "server_stopping") {
                pausedByServer = true;
                serverPauseReason = "server_stopping";
                pendingReconnect = false;
                clearReconnectTimer();
                stopHeartbeat();
                connectStartedAt = 0;
                sendBtn.disabled = true;
                showUserNotice("Server wordt nu gestopt.", { autoHideMs: 5000 });
              } else if (msg.message) {
                showUserNotice(String(msg.message));
              }
              noteServerSeen();
              return;
            }
            if (msg.type === "error") {
              handleServerError(msg);
              noteServerSeen();
            }
          } catch {}
        });
      }

      function send() {
        if (pausedByServer) {
          appendChat(
            serverPauseReason === "join_required"
              ? "Deze sessie is vergrendeld. Scan de nieuwste QR-link om opnieuw mee te doen."
              : serverPauseReason === "session_inactive"
                ? "Deze sessie is beëindigd. Wacht op een nieuwe join-link."
                : serverPauseReason === "server_stopping"
                  ? "Server wordt gestopt. Wacht tot die weer gestart is."
                : "Deze sessie is gesloten. Ververs pagina om opnieuw mee te doen."
          );
          return;
        }
        const text = textEl.value.trim();
        if (!text) return;

        if (!ws || ws.readyState !== WebSocket.OPEN) {
          appendChat("Offline");
          ensureFreshConnection();
          return;
        }

        const name = sanitizeNameClient(localStorage.getItem("live_name"));
        if (!name) {
          myName = getOrAskName();
        }

        ws.send(JSON.stringify({ type: "comment", name: name || myName, text, clientTag }));
        textEl.value = "";
        textEl.focus();
      }

      sendBtn.addEventListener("click", send);
      textEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      });

      function submitPollVote() {
        if (!activePoll) return;
        if (!Number.isInteger(selectedPollOptionIndex)) return;
        const remainingMs = getPollRemainingMs();
        if (remainingMs !== null && remainingMs <= 0) {
          appendChat("Deze poll is al afgelopen.");
          renderPollOptions();
          renderPollMeta();
          return;
        }
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          appendChat("Offline");
          ensureFreshConnection();
          return;
        }
        pollVotePending = true;
        renderPollOptions();
        renderPollMeta();
        ws.send(
          JSON.stringify({
            type: "poll_vote",
            pollId: activePoll.id,
            optionIndex: selectedPollOptionIndex,
            clientTag,
          })
        );
      }

      pollOptionsEl.addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-poll-option]");
        if (!btn || !activePoll) return;
        const optionIndex = Number.parseInt(btn.getAttribute("data-poll-option"), 10);
        if (!Number.isInteger(optionIndex)) return;
        selectedPollOptionIndex = optionIndex;
        renderPollOptions();
        renderPollMeta();
      });
      pollSubmitBtn.addEventListener("click", submitPollVote);
      reactionBarEl.addEventListener("pointerdown", (e) => {
        const btn = readReactionButtonFromEventTarget(e.target);
        if (!btn) return;
        clearReactionButtonPressedState();
        btn.classList.add("reaction-pressed");
      });
      reactionBarEl.addEventListener("pointerup", (e) => {
        const btn = readReactionButtonFromEventTarget(e.target);
        const reactionKey = btn ? String(btn.getAttribute("data-reaction") || "") : "";
        clearReactionButtonPressedState();
        if (!reactionKey) return;
        triggerReactionTapFeedback(btn);
        lastReactionPointerAt = Date.now();
        e.preventDefault();
        sendReaction(reactionKey);
      });
      reactionBarEl.addEventListener("pointercancel", () => {
        clearReactionButtonPressedState();
      });
      reactionBarEl.addEventListener("pointerleave", () => {
        clearReactionButtonPressedState();
      });
      reactionBarEl.addEventListener("click", (e) => {
        const btn = readReactionButtonFromEventTarget(e.target);
        const reactionKey = btn ? String(btn.getAttribute("data-reaction") || "") : "";
        if (!reactionKey) return;
        if (Date.now() - lastReactionPointerAt < REACTION_POINTER_GHOST_MS) {
          e.preventDefault();
          return;
        }
        triggerReactionTapFeedback(btn);
        sendReaction(reactionKey);
      });
      reactionBarEl.addEventListener("dblclick", (e) => {
        if (e.target.closest("button[data-reaction]")) {
          e.preventDefault();
        }
      });

      window.addEventListener("online", () => {
        debugLog("browser online");
        connectNow("online");
      });
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          if (pageDeactivating) {
            pageDeactivating = false;
            startConnectionManager();
            startHealthProbeLoop();
          }
          if (pendingReconnect) scheduleReconnect("visibilitychange");
          ensureFreshConnection();
        }
      });
      window.addEventListener("focus", () => {
        if (pageDeactivating) {
          pageDeactivating = false;
          startConnectionManager();
          startHealthProbeLoop();
        }
        ensureFreshConnection();
      });
      window.addEventListener("pageshow", (ev) => {
        if (pageDeactivating) {
          pageDeactivating = false;
          startConnectionManager();
          startHealthProbeLoop();
        }
        if (ev.persisted) {
          debugLog("pageshow persisted -> reset socket");
          try { ws && ws.close(); } catch {}
          ws = null;
        }
        if (pendingReconnect) scheduleReconnect("pageshow");
        ensureFreshConnection();
      });
      window.addEventListener("pagehide", (ev) => {
        pageDeactivating = true;
        pendingReconnect = false;
        clearConnectTimeout();
        clearReconnectTimer();
        stopHeartbeat();
        if (connectionManagerTimer) {
          clearInterval(connectionManagerTimer);
          connectionManagerTimer = null;
        }
        if (healthProbeTimer) {
          clearInterval(healthProbeTimer);
          healthProbeTimer = null;
        }
        healthProbeInFlight = false;
        if (ev.persisted) {
          debugLog("pagehide persisted -> close socket");
          try { ws && ws.close(1001, "pagehide"); } catch {}
          ws = null;
        }
      });

      (async () => {
        await loadChatHistory();
        startConnectionManager();
        startHealthProbeLoop();
        fetchBuildLabelOnce();
        connect();
      })();
    </script>
  </body>
</html>
